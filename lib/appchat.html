<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聊天室</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root { --green: #07c160; --bubble-me: #95ec69; --bg: #f5f5f5; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); }

  /* 进入页 */
  #join-screen {
    height: 100%; display: flex; align-items: center; justify-content: center;
  }
  .join-card {
    width: 320px; background: #fff; border-radius: 18px;
    padding: 36px 28px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .join-icon { font-size: 40px; margin-bottom: 10px; }
  .join-title { font-size: 18px; font-weight: 600; color: #222; margin-bottom: 24px; }
  .join-input {
    width: 100%; height: 46px; background: #f4f4f4; border: none;
    border-radius: 23px; padding: 0 18px; font-size: 15px; outline: none;
    margin-bottom: 12px; color: #333;
  }
  .join-btn {
    width: 100%; height: 46px; background: var(--green); color: #fff;
    border: none; border-radius: 23px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .15s;
  }
  .join-btn:disabled { background: #ccc; cursor: not-allowed; }
  .join-btn:hover:not(:disabled) { opacity: .9; }
  .join-status { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
  .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
  .join-status span { font-size: 12px; color: #999; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.6} }

  /* 聊天页 */
  #chat-screen { height: 100%; display: none; flex-direction: column; max-width: 480px; margin: 0 auto; }

  #header {
    padding: 12px 16px; background: rgba(255,255,255,.95);
    backdrop-filter: blur(12px); border-bottom: 1px solid #e8e8e8;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px var(--green); animation: pulse 1.5s infinite; }
  .header-title { font-size: 14px; font-weight: 600; color: #333; }
  .copy-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 10px;
    background: var(--green); color: #fff; border: none; cursor: pointer; font-weight: 500;
  }
  .copy-btn.copied { background: #aaa; }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    scrollbar-width: thin; scrollbar-color: #ddd transparent;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  .empty { text-align: center; color: #bbb; font-size: 13px; padding-top: 40px; }

  .msg-wrap { display: flex; flex-direction: column; margin-bottom: 20px; }
  .msg-wrap.right { align-items: flex-end; }
  .msg-wrap.left { align-items: flex-start; }
  .msg-meta { font-size: 10px; color: #aaa; margin-bottom: 4px; padding: 0 4px; }
  .bubble {
    padding: 10px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5;
    max-width: 75%; word-break: break-word;
  }
  .right .bubble { background: var(--bubble-me); border-radius: 16px 4px 16px 16px; }
  .left .bubble { background: #fff; border: 1px solid #eee; border-radius: 4px 16px 16px 16px; }
  .msg-wrap img { max-width: 75%; border-radius: 10px; border: 1px solid #eee; }
  .msg-wrap video { max-width: 75%; border-radius: 10px; }
  .read-tag { font-size: 10px; margin-top: 3px; padding: 0 4px; }
  .read-tag.read { color: var(--green); }
  .read-tag.unread { color: #ccc; }

  .sys-msg { text-align: center; margin: 10px 0; }
  .sys-msg span {
    font-size: 11px; color: #aaa; background: rgba(0,0,0,.05);
    padding: 3px 12px; border-radius: 10px;
  }

  #bottom { padding: 12px; background: #fafafa; border-top: 1px solid #e8e8e8; flex-shrink: 0; }
  #extra-menu { display: none; flex-wrap: wrap; gap: 8px; padding-bottom: 10px; }
  .tool-btn {
    padding: 7px 14px; background: #f0f0f0; border-radius: 10px;
    font-size: 12px; border: none; cursor: pointer; color: #444;
  }
  .action-row { display: flex; gap: 10px; align-items: center; }
  .plus-btn {
    width: 38px; height: 38px; border-radius: 50%; background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: pointer; border: none; flex-shrink: 0;
  }
  .input-wrap {
    flex: 1; height: 42px; background: #f0f0f0; border-radius: 21px;
    display: flex; align-items: center; padding: 0 16px;
  }
  .input-wrap input {
    flex: 1; border: none; background: transparent; outline: none;
    font-size: 15px; color: #333;
  }
  .send-btn {
    background: var(--green); color: #fff; border: none;
    padding: 7px 18px; border-radius: 18px; font-weight: 600;
    font-size: 14px; cursor: pointer; flex-shrink: 0;
  }
  .send-btn:disabled { opacity: .45; cursor: not-allowed; }
  #file-input { display: none; }
</style>
</head>
<body>

<!-- 进入页 -->
<div id="join-screen">
  <div class="join-card">
    <div class="join-icon">💬</div>
    <div class="join-title">进入聊天室</div>
    <input class="join-input" id="nick-input" placeholder="输入昵称..." maxlength="20" />
    <button class="join-btn" id="join-btn" disabled>连接中...</button>
    <div class="join-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">正在连接...</span>
    </div>
  </div>
</div>

<!-- 聊天页 -->
<div id="chat-screen">
  <div id="header">
    <div class="header-left">
      <div class="header-dot"></div>
      <span class="header-title" id="header-title">在线 0 人</span>
    </div>
    <button class="copy-btn" id="copy-btn">复制链接</button>
  </div>
  <div id="messages"><div class="empty">还没有消息，说点什么吧</div></div>
  <div id="bottom">
    <div id="extra-menu">
      <button class="tool-btn" onclick="quickSend('在的，有什么可以帮您？')">💬 在的，有什么可以帮您？</button>
      <button class="tool-btn" onclick="document.getElementById('file-input').click()">📁 发送图片/视频</button>
      <input type="file" id="file-input" accept="image/*,video/*">
    </div>
    <div class="action-row">
      <button class="plus-btn" onclick="toggleMenu()">+</button>
      <div class="input-wrap">
        <input type="text" id="msg-input" placeholder="发送消息..." maxlength="500" />
      </div>
      <button class="send-btn" id="send-btn" onclick="send()">发送</button>
    </div>
  </div>
</div>

<script>
// ── 房间暗码 ──
function getRoom() {
  const p = new URLSearchParams(location.search);
  let r = p.get('room');
  if (!r) {
    r = Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,10);
    p.set('room', r);
    history.replaceState({}, '', location.pathname + '?' + p.toString());
  }
  return r;
}
const ROOM = getRoom();

// ── Socket ──
const socket = io({ path: '/socket.io', transports: ['websocket','polling'] });
let myNick = '', readUpTo = 0;

socket.on('connect', () => {
  document.getElementById('status-dot').classList.add('on');
  document.getElementById('status-text').textContent = '已连接';
  document.getElementById('join-btn').disabled = false;
  document.getElementById('join-btn').textContent = '进入聊天室';
});

socket.on('disconnect', () => {
  document.getElementById('status-dot').classList.remove('on');
  document.getElementById('status-text').textContent = '已断开';
});

// ── 加入 ──
function joinRoom(nick) {
  myNick = nick;
  socket.emit('join', { nickname: nick, room: ROOM });
  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('msg-input').focus();
}

document.getElementById('join-btn').addEventListener('click', () => {
  const v = document.getElementById('nick-input').value.trim();
  if (v) joinRoom(v);
});
document.getElementById('nick-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const v = e.target.value.trim(); if (v) joinRoom(v); }
});

// ── 消息 ──
socket.on('message', msg => {
  appendMsg(msg);
  if (document.hasFocus()) socket.emit('mark_read', Date.now());
});
socket.on('system', msg => appendSys(msg.text));
socket.on('user_count', n => { document.getElementById('header-title').textContent = '在线 ' + n + ' 人'; });
socket.on('read_receipt', payload => {
  readUpTo = Math.max(readUpTo, payload.readUpTo);
  refreshReadTags();
});
window.addEventListener('focus', () => socket.emit('mark_read', Date.now()));

// ── 渲染 ──
function appendMsg(msg) {
  const box = document.getElementById('messages');
  const empty = box.querySelector('.empty');
  if (empty) empty.remove();

  const isMe = msg.nickname === myNick;
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (isMe ? 'right' : 'left');
  wrap.dataset.ts = msg.timestamp;
  wrap.dataset.mine = isMe ? '1' : '0';

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = (isMe ? '' : msg.nickname + ' · ') + msg.timeText;
  wrap.appendChild(meta);

  if (msg.msgType === 'text') {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = msg.content;
    wrap.appendChild(b);
  } else if (msg.msgType === 'image') {
    const img = document.createElement('img');
    img.src = msg.content;
    wrap.appendChild(img);
  } else if (msg.msgType === 'video') {
    const v = document.createElement('video');
    v.src = msg.content; v.controls = true;
    wrap.appendChild(v);
  }

  if (isMe) {
    const tag = document.createElement('div');
    tag.className = 'read-tag unread';
    tag.textContent = '未读';
    wrap.appendChild(tag);
  }

  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function appendSys(text) {
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.innerHTML = '<span>' + text + '</span>';
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function refreshReadTags() {
  document.querySelectorAll('.msg-wrap[data-mine="1"]').forEach(wrap => {
    const ts = parseInt(wrap.dataset.ts);
    const tag = wrap.querySelector('.read-tag');
    if (!tag) return;
    if (readUpTo >= ts) { tag.textContent = '已读'; tag.className = 'read-tag read'; }
    else { tag.textContent = '未读'; tag.className = 'read-tag unread'; }
  });
}

// ── 发送 ──
function send() {
  const inp = document.getElementById('msg-input');
  const t = inp.value.trim();
  if (!t) return;
  socket.emit('message', { role: '用户', content: t, msgType: 'text' });
  inp.value = '';
  inp.focus();
}
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});

function quickSend(t) {
  socket.emit('message', { role: '客服', content: t, msgType: 'text' });
  toggleMenu();
}

document.getElementById('file-input').addEventListener('change', function() {
  if (!this.files[0]) return;
  const ft = this.files[0].type.startsWith('video') ? 'video' : 'image';
  const reader = new FileReader();
  reader.onload = e => {
    socket.emit('message', { role: '用户', content: e.target.result, msgType: ft });
    toggleMenu();
  };
  reader.readAsDataURL(this.files[0]);
  this.value = '';
});

// ── 工具 ──
function toggleMenu() {
  const m = document.getElementById('extra-menu');
  m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制链接'; btn.classList.remove('copied'); }, 2000);
  });
});
</script>
</body>
</html>
